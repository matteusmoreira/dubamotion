<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 150" width="100%" height="100%">
  <defs>
    <!-- Gradiente que suaviza as pontas laterais -->
    <linearGradient id="chevronGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF88" stop-opacity="0" />
      <stop offset="15%" stop-color="#00FF88" stop-opacity="0.25" />
      <stop offset="50%" stop-color="#00FF88" stop-opacity="1" />
      <stop offset="85%" stop-color="#00FF88" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00FF88" stop-opacity="0" />
    </linearGradient>
    
    <!-- Filtro de brilho neon (Glow) -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes scrollArrow {
      0% {
        transform: translateY(-20px);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      80% {
        opacity: 1;
      }
      100% {
        transform: translateY(20px);
        opacity: 0;
      }
    }
    .anim-arrow {
      animation: scrollArrow 2.2s infinite cubic-bezier(0.25, 1, 0.5, 1);
    }
  </style>
  <g class="anim-arrow">
    <!-- Chevron largo com vértices definidos -->
    <path 
      d="M 15 45 L 150 95 L 285 45 L 150 110 Z" 
      fill="url(#chevronGrad)"
      filter="url(#neonGlow)"
    />
  </g>
</svg>
